<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to PDF Converter</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
    <div class="app-wrapper">
        <div class="container">
            <header>
                <h1>🖼️ Image to PDF</h1>
                <p>Upload images (JPG, PNG), arrange them, and convert them into PDF documents.</p>
            </header>
            
            <div class="upload-area" id="upload-area">
                <input type="file" id="file-input" accept="image/jpeg, image/jpg, image/png" multiple style="display: none;">
                <button class="upload-btn" id="choose-btn">Choose Images</button>
                <p>or drag and drop your files here</p>
            </div>

            <div id="action-bar" style="display: none;" class="action-bar">
                <h3>Images ready to convert:</h3>
                <p id="status-text" style="color: #4facfe; font-weight: 600; margin-bottom: 1.5rem; font-size: 1.1rem;">
                    0 images selected.
                </p>
                
                <div class="convert-buttons">
                    <button id="convert-single-btn" class="final-btn btn-single">📦 Convert to Single PDF</button>
                    <button id="convert-individual-btn" class="final-btn btn-individual">📑 Convert to Individual PDFs</button>
                </div>
                <hr class="divider">
            </div>

            <div id="output-container" class="output-grid"></div>
        </div>
    </div>

    <div class="modal" id="processing-modal">
        <div class="modal-content">
            <div class="loader"></div>
            <h2>Processing...</h2>
            <p>Please wait while we build your PDF(s).</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
